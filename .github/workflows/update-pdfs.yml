name: Update PDF Cache

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

concurrency:
  group: update-pdf-cache
  cancel-in-progress: false  # Queue; don't kill a running extraction mid-way

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --omit=dev

      - name: Extract PDF text
        run: node scripts/extract-pdfs.mjs
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}

      - name: Commit updated PDF cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/pdf-data.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update PDF cache [skip ci]"
            git push
          else
            echo "PDF cache unchanged, nothing to commit."
          fi
